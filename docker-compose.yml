version: "3.9"

services:
  # ── Gradio Demo App ──
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: driver-guard-webapp
    ports:
      - "7860:7860"
    environment:
      - MODEL_PATH=/app/models/best_model.pth
      - MODEL_ARCH=efficientnet_b3
      - PORT=7860
      - PYTHONPATH=/app
    volumes:
      - ./models:/app/models:ro
      - ./src:/app/src:ro
      - ./configs:/app/configs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # ── Flask REST API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: driver-guard-api
    command: python src/inference/api_server.py
    ports:
      - "5000:5000"
    environment:
      - MODEL_PATH=/app/models/best_model.pth
      - MODEL_ARCH=efficientnet_b3
      - PORT=5000
      - PYTHONPATH=/app
    volumes:
      - ./models:/app/models:ro
      - ./src:/app/src:ro
    restart: unless-stopped

  # ── MLflow Tracking Server ──
  mlflow:
    image: python:3.10-slim
    container_name: driver-guard-mlflow
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server
               --host 0.0.0.0
               --port 5001
               --backend-store-uri /mlruns
               --default-artifact-root /mlartifacts"
    ports:
      - "5001:5001"
    volumes:
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts
    restart: unless-stopped

volumes:
  mlruns:
  mlartifacts:
